name: kalpix_sdk
description: >-
  Official Flutter SDK for the Kalpix backend. Provides typed APIs for
  authentication, real-time chat, social graph, store/economy, game
  matchmaking, and avatar management over HTTP and WebSocket.
version: 0.4.1
homepage: https://github.com/kalpix-games/kalpix_sdk
repository: https://github.com/kalpix-games/kalpix_sdk
issue_tracker: https://github.com/kalpix-games/kalpix_sdk/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
